apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  labels:
    project: roboshop
    purpose: replicaset-demo
    component: frontend
    environment: dev
    tier: web

spec:
  replicas: 3

  selector:
    matchLabels:
      project: roboshop
      purpose: replicaset-demo
      component: frontend
      environment: dev
      tier: web

  template:
    metadata:
      labels:
        project: roboshop
        purpose: replicaset-demo
        component: frontend
        environment: dev
        tier: web

    spec:
      containers:
      - name: nginx
        image: nginx
      
        